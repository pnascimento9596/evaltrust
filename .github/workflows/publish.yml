name: Publish to PyPI

# Publishes the package to PyPI when a GitHub Release is published.
# Uses PyPI Trusted Publishing (OpenID Connect) — no API tokens are stored.
# Requires a PyPI trusted publisher configured for this repo and this workflow
# file. See the "Releasing" section in CONTRIBUTING.md.

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # required for trusted publishing
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build and validate
        run: |
          python -m pip install --upgrade build twine
          python -m build
          twine check dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
